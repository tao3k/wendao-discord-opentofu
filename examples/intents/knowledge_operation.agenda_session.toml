kind = "knowledge_operation"
goal = "agenda_session"
title = "Plan a reading session for Attention Is All You Need"
requested_by = "workflow"
review_mode = "plan_then_apply"
receipt_required = true

[workflow]
engine = "wendao"
model = "bpmn"
process_ref = "wendao://workflow/agenda-session"
run_ref = "wendao://workflow-run/example-agenda"
graph_ref = "wendao://workflow-graph/example-agenda"
node_ref = "bpmn:SubProcess.AgendaSession"

[context]
server_ref = "discord://server/wendao"
profile_ref = "examples/intents/vertical_community.healthcare.toml"
source_refs = [
  "wendao://paper/attention-is-all-you-need",
]

[[actions]]
id = "open_agenda_item"
kind = "agenda_item"
mode = "runtime"
target = "agenda"
intent_path = "examples/intents/agenda_item.attention_reading_session.toml"
workflow_node_ref = "bpmn:ServiceTask.OpenAgendaItem"
graph_node_ref = "petgraph:open_agenda_item"

[[actions]]
id = "schedule_session"
kind = "scheduled_event"
mode = "runtime"
target = "agenda"
intent_path = "examples/intents/scheduled_event.attention_reading_session.toml"
workflow_node_ref = "bpmn:ServiceTask.ScheduleSession"
graph_node_ref = "petgraph:schedule_session"
depends_on = ["open_agenda_item"]

[[actions]]
id = "record_receipt"
kind = "projection_receipt"
mode = "record"
workflow_node_ref = "bpmn:ServiceTask.RecordAgendaReceipt"
graph_node_ref = "petgraph:record_agenda_receipt"
depends_on = ["open_agenda_item", "schedule_session"]
